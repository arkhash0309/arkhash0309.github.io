<!doctype html>
<html lang="en" data-theme="dark" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aadhavan Arkhash Saravanakumar — ML engineer and AI researcher. Selected projects, internship experience, and writing." />
    <meta property="og:title" content="Aadhavan Arkhash Saravanakumar" />
    <meta property="og:description" content="ML engineer and AI researcher. Selected projects, internship experience, and writing." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:type" content="website" />
    <title>Aadhavan Arkhash Saravanakumar — AI & Data Science</title>
    <script>
      // Theme bootstrap (avoids FOUC)
      (function () {
        try {
          var stored = localStorage.getItem('arkhash-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          document.documentElement.classList.toggle('dark', theme === 'dark');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
    <!-- SPA GitHub Pages redirect restore -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) { return s.replace(/~and~/g, '&'); }).join('?');
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
